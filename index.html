<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To Do List Pastel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<main class="app">
  <section class="topbar">
    <div class="topbar-left">
      <h1>Minha To Do List</h1>
      <p class="subtitle">Organize suas tarefas do dia</p>
    </div>

    <div class="topbar-right">
      <div class="counter" id="taskCounter">0 tarefas</div>
      <button class="clear-btn" id="clearTasksBtn">Limpar tarefas</button>
    </div>
  </section>

  <section class="input-card">
    <label class="label" for="taskInput">Adicionar tarefa</label>

    <div class="input-wrap">
      <input
              id="taskInput"
              type="text"
              maxlength="60"
              placeholder="Digite sua tarefa"
              autocomplete="off"
      />
    </div>

    <div class="meta-row">
      <span class="hint" id="charCount">0/60 caracteres</span>
      <span class="error" id="errorMsg"></span>
    </div>

    <button class="add-btn" id="addTaskBtn">Adicionar</button>
  </section>

  <section class="filter-bar">
    <button class="filter-btn active" id="filterAllBtn">Todas</button>
    <button class="filter-btn" id="filterPendingBtn">Pendentes</button>
    <button class="filter-btn" id="filterCompletedBtn">Concluídas</button>
  </section>

  <button class="clear-completed-btn" id="clearCompletedBtn">Limpar concluídas</button>

  <p class="section-title">Tarefas</p>
  <section class="task-list" id="taskList"></section>
</main>

<script src="script.js"></script>
</body>
</html>
